<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Add Supplier</title>

    <link rel="stylesheet"
          href="{{ url_for('static', filename='supplier.css') }}">

</head>

<body>

<div class="page">

    <!-- Breadcrumb -->

    <div class="breadcrumb">

        Dashboard >

        Inventory >

        Supplier >

        <span>Add Supplier</span>

    </div>

    <!-- Page Title -->

    <div class="page-title">

        <div>

            <h1>🚚 Add Supplier</h1>

            <p>

                Add a new supplier to your inventory.

            </p>

        </div>

    </div>

    <div class="card">

        <h2>Supplier Information</h2>

        <form method="POST">

            <div class="input-group">

                <label>Supplier Name *</label>

                <input
                    type="text"
                    name="supplier_name"
                    required>

            </div>

            <div class="input-group">

                <label>Company Name *</label>

                <input
                    type="text"
                    name="company_name"
                    required>

            </div>

            <div class="input-group">

                <label>Phone *</label>

                <input
                    type="text"
                    name="phone"
                    required>

            </div>

            <div class="input-group">

                <label>Email</label>

                <input
                    type="email"
                    name="email">

            </div>

            <div class="input-group">

                <label>Address</label>

                <textarea
                    name="address"
                    rows="4"></textarea>

            </div>

            <div class="button-group">

                <button
                    type="submit"
                    class="save-btn">

                    Save Supplier

                </button>

                <a href="/supplier"
                   class="back-btn">

                    Cancel

                </a>

            </div>

        </form>

    </div>

</div>

</body>

</html>
