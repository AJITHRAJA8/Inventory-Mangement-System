<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Category Management</title>

    <link rel="stylesheet"
          href="{{ url_for('static', filename='category.css') }}">

</head>

<body>

<div class="container">

    <div class="header">

        <h2>Category Management</h2>

        <a href="/add_category" class="add-btn">

            + Add Category

        </a>

    </div>

    <div class="search-box">

        <form action="/category" method="GET">

            <input
                type="text"
                name="search"
                placeholder="Search Category">

            <button type="submit">

                Search

            </button>

        </form>

    </div>

    <table action="/category">

        <thead>

            <tr>

                <th>ID</th>

                <th>Category Name</th>

                <th>Description</th>

                <th>Action</th>

            </tr>

        </thead>

        <tbody>
            {% for row in datas %}

            <tr>

                <td>{{ row.category_id }}</td>

                <td>{{ row.category_name }}</td>

                <td>{{ row.description }}</td>

                <td>

                    <a href="#">Edit</a>

                    |

                    <a href="#">Delete</a>

                </td>

            </tr>
            {% endfor %}

        </tbody>

    </table>

</div>

</body>

</html>
