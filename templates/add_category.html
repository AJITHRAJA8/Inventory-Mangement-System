<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Add Category</title>

    <link rel="stylesheet"
          href="{{ url_for('static', filename='category.css') }}">

</head>

<body>

<div class="page">

    <!-- Breadcrumb -->

    <div class="breadcrumb">

        Dashboard >

        Category >

        <span>Add Category</span>

    </div>

    <!-- Page Title -->

    <div class="page-title">

        <h1>📂 Add New Category</h1>

        <p>Create a new category to organize your inventory products.</p>

    </div>

    <!-- Card -->

    <div class="card">

        <h2 >Category Information</h2>

        {% if error %}
        <div class="error-message">
            {{error}}
        </div>
        {% endif %}

        <form method="POST">

            <div class="input-group">

                <label>

                    Category Name *

                </label>

                <input
                    type="text"
                    name="category_name"
                    value="{{ category_name if category_name else '' }}"
                    placeholder="Example : Electronics"
                    required>

            </div>

            <div class="input-group">

                <label>

                    Description

                </label>

                <textarea
                    name="description"
                    rows="5"
                    placeholder="Example : Electronic devices and accessories">{{ description if description else '' }}</textarea>

            </div>

            <div class="button-group">

                <button class="save-btn">

                    💾 Save Category

                </button>

                <a href="/category"
                   class="back-btn">

                    ← Back

                </a>

            </div>

        </form>

    </div>

</div>

</body>

</html>
