<!DOCTYPE html>
<html>

<head>

    <title>Add Category</title>

    <link rel="stylesheet"
          href="{{ url_for('static', filename='category.css') }}">

</head>

<body>

<div class="container">

    <h2>Add Category</h2>

    <form method="POST">

        <div class="input-box">

            <label>Category Name</label>

            <input
                type="text"
                name="category_name"
                required>

        </div>

        <div class="input-box">

            <label>Description</label>

            <textarea
                name="description"
                rows="5"
                required></textarea>

        </div>

        <button type="submit">

            Save Category

        </button>

        <a href="/category" class="cancel-btn">

            Cancel

        </a>

    </form>

</div>

</body>

</html>
