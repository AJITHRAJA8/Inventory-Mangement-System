<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Delete Supplier</title>

    <link rel="stylesheet"
          href="{{ url_for('static', filename='supplier.css') }}">

</head>

<body>

<div class="page">

    <div class="breadcrumb">

        Dashboard >

        Inventory >

        Suppliers >

        <span>Delete Supplier</span>

    </div>

    <div class="page-title">

        <div>

            <h1>🗑 Delete Supplier</h1>

            <p>Are you sure you want to delete this supplier?</p>

        </div>

    </div>

    <div class="card">

        <h2>Supplier Details</h2>

        <form method="POST">

            <div class="input-group">

                <label>Supplier Name</label>

                <input
                    type="text"
                    value="{{ data.supplier_name }}"
                    readonly>

            </div>

            <div class="input-group">

                <label>Company Name</label>

                <input
                    type="text"
                    value="{{ data.company_name }}"
                    readonly>

            </div>

            <div class="input-group">

                <label>Phone</label>

                <input
                    type="text"
                    value="{{ data.phone }}"
                    readonly>

            </div>

            <div class="input-group">

                <label>Email</label>

                <input
                    type="text"
                    value="{{ data.email }}"
                    readonly>

            </div>

            <div class="input-group">

                <label>Address</label>

                <textarea rows="4" readonly>{{ data.address }}</textarea>

            </div>

            <div class="button-group">

                <button
                    type="submit"
                    class="delete-btn">

                    🗑 Delete Supplier

                </button>

                <a href="/supplier"
                   class="back-btn">

                    ← Cancel

                </a>

            </div>

        </form>

    </div>

</div>

</body>

</html>
